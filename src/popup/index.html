<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark Search</title>
  <link rel="stylesheet" href="./index.css">
</head>

<body>
  <div class="header">
    <div class="header-icon">
      <img src="../../images/icon128.png" alt="logo">
    </div>
    <div class="header-title">Bookmark Search</div>
    <button class="settings-btn" id="settingsBtn" title="设置">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3" />
        <path
          d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
      </svg>
    </button>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome-message">
      <div class="welcome-title">Bookmark Search</div>
      <div class="welcome-desc">输入关键词搜索收藏夹，<br>基于语义相似度返回最相关的结果</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="请输入关键词...">
    <button id="sendBtn">搜索</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
