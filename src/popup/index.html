<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收藏夹搜索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 500px;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
    }

    .header {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-icon svg {
      width: 16px;
      height: 16px;
      color: #fff;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .model-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      font-size: 12px;
    }

    .model-status-text {
      padding: 4px 8px;
      border-radius: 12px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .model-status-text:hover {
      filter: brightness(0.95);
    }

    .download-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .download-btn:hover {
      opacity: 0.8;
    }

    .btn-download {
      background: #667eea;
      color: #fff;
    }

    .btn-view {
      background: #e0e0e0;
      color: #333;
    }

    .status-available {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .status-downloading {
      background: #fff3e0;
      color: #f57c00;
    }

    .status-unavailable {
      background: #ffebee;
      color: #c62828;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message-ai {
      align-self: flex-start;
      background: #fff;
      border: 1px solid #e0e0e0;
      color: #333;
    }

    .message-user {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .error-message {
      background: #ffebee;
      border-color: #ffcdd2;
      color: #c62828;
    }

    .recommend-item {
      display: block;
      padding: 8px 10px;
      margin: 4px -6px;
      border-radius: 6px;
      color: #333;
      text-decoration: none;
      transition: background-color 0.15s;
    }

    .recommend-item:hover {
      background-color: #f5f5f5;
    }

    .recommend-title {
      font-weight: 500;
      font-size: 13px;
    }

    .input-area {
      padding: 12px 16px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .input-area input:disabled {
      background: #f5f5f5;
    }

    .input-area button {
      padding: 10px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .input-area button:hover {
      opacity: 0.9;
    }

    .input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: #888;
    }

    .welcome-title {
      font-size: 16px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }

    .welcome-desc {
      font-size: 13px;
      line-height: 1.6;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
      font-size: 13px;
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dots span {
      width: 6px;
      height: 6px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z" />
        <path d="M12 6a6 6 0 0 0-6 6 6 6 0 0 0 6 6 6 6 0 0 0 6-6 6 6 0 0 0-6-6zm0 10a4 4 0 1 1 4-4 4 4 0 0 1-4 4z" />
      </svg>
    </div>
    <div class="header-title">收藏夹搜索</div>
    <div class="model-status" id="modelStatus">
      <span class="model-status-text" id="modelStatusText">检查中...</span>
      <button class="download-btn" id="downloadBtn" style="display: none;"></button>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome-message">
      <div class="welcome-title">收藏夹搜索</div>
      <div class="welcome-desc">输入关键词搜索收藏夹，<br>基于语义相似度返回最相关的结果</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="描述你想要的内容...">
    <button id="sendBtn">发送</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>

</html>
