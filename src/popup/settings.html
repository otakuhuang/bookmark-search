<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      height: 500px;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
    }

    .header {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .back-btn:hover {
      background: #e0e0e0;
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
      color: #333;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .content {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .section {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #e0e0e0;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }

    .section-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .rebuild-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .rebuild-btn:hover {
      opacity: 0.9;
    }

    .rebuild-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .rebuild-btn.loading {
      background: #e0e0e0;
      color: #666;
    }

    /* 进度条 */
    .progress-container {
      display: none;
      margin-top: 16px;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      text-align: center;
    }

    .version {
      text-align: center;
      font-size: 12px;
      color: #999;
      margin-top: auto;
      padding: 16px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .setting-row:last-child {
      border-bottom: none;
    }

    .setting-label {
      font-size: 14px;
      color: #333;
    }

    .setting-desc {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    .setting-input {
      width: 80px;
      padding: 8px 12px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      outline: none;
    }

    .setting-input:focus {
      border-color: #667eea;
    }
  </style>
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>
    <div class="header-title">设置</div>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-title">搜索设置</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示条数</div>
          <div class="setting-desc">0 为不限制</div>
        </div>
        <input type="number" class="setting-input" id="resultLimit" min="0" placeholder="20">
      </div>
    </div>

    <div class="section">
      <div class="section-title">向量数据库</div>
      <div class="section-desc">
        收藏夹中的每个书签都会生成向量嵌入，用于语义搜索。重建数据将清空现有索引并重新生成。
      </div>
      <button class="rebuild-btn" id="rebuildBtn">重建数据</button>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">准备中...</div>
      </div>
    </div>
  </div>

  <div class="version">Bookmark Search v1.0.0</div>

  <script type="module" src="./settings.js"></script>
</body>

</html>
