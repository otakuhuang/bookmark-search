<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>
  <link rel="stylesheet" href="./settings.css">
</head>

<body>
  <div class="header">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </button>
    <div class="header-title">设置</div>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-title">搜索设置</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">显示条数</div>
          <div class="setting-desc">0 为不限制</div>
        </div>
        <input type="number" class="setting-input" id="resultLimit" min="0" placeholder="20">
      </div>
    </div>

    <div class="section">
      <div class="section-title">向量数据库</div>
      <div class="section-desc">
        收藏夹中的每个书签都会生成向量嵌入，用于语义搜索。重建数据将清空现有索引并重新生成。
      </div>
      <button class="rebuild-btn" id="rebuildBtn">重建数据</button>
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">准备中...</div>
      </div>
    </div>
  </div>

  <div class="version">Bookmark Search v1.0.0</div>

  <script type="module" src="./settings.js"></script>
</body>

</html>
